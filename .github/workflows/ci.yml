name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (pytest + lint)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: rotavenda
          POSTGRES_PASSWORD: rotavenda
          POSTGRES_DB: rotavenda_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest-cov

      - name: Lint (black + isort check)
        run: |
          pip install black isort
          black --check .
          isort --check-only .

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+psycopg2://rotavenda:rotavenda@localhost:5432/rotavenda_test
          SECRET_KEY: ci-secret-key-32-chars-minimum-xx
          ENVIRONMENT: development
          FIRST_SUPERUSER_EMAIL: ci@rotavenda.com
          FIRST_SUPERUSER_PASSWORD: ci-password
          FIRST_SUPERUSER_NAME: CI
        run: alembic upgrade head

      - name: Run tests
        env:
          DATABASE_URL: postgresql+psycopg2://rotavenda:rotavenda@localhost:5432/rotavenda_test
          SECRET_KEY: ci-secret-key-32-chars-minimum-xx
          ENVIRONMENT: development
          FIRST_SUPERUSER_EMAIL: ci@rotavenda.com
          FIRST_SUPERUSER_PASSWORD: ci-password
          FIRST_SUPERUSER_NAME: CI
        run: pytest -x --cov=app --cov-report=term-missing

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
        run: npm run build
